title: Open Internet Manifest
description: A living manifesto for a free, open and decentralized internet

url: "https://openinternetmanifest.org"
baseurl: ""

collections:
  guides:
    output: true
  theses:
    output: true
  social-posts:
    output: true

defaults:
  - scope:
      path: ""
      type: "guides"
    values:
      layout: default
  - scope:
      path: ""
      type: "theses"
    values:
      layout: default
  - scope:
      path: ""
      type: "social-posts"
    values:
      layout: social-posts      # behoud je eigen layout
  - scope:
      path: "en"
    values:
      lang: "en"
  - scope:
      path: "nl"
    values:
      lang: "nl"

include:
  - admin/

exclude:
  - venv
  - tools
  - .git
  - .jekyll-cache
  - Gemfile.lock
  - .DS_Store

rebuild_trigger: v2026-03-28