title: Open Internet Manifest
description: A living manifesto for a free, open and decentralized internet

url: "https://openinternetmanifest.org"
baseurl: ""

# Collections
collections:
  guides:
    output: true
  theses:
    output: true
  social-posts:
    output: true

# Markdown settings
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge
  table_of_contents: false

# Defaults
defaults:
  - scope:
      path: "_pages"
    values:
      layout: default
      permalink: "/:basename/"

  - scope:
      path: ""
      type: "guides"
    values:
      layout: default

  - scope:
      path: ""
      type: "theses"
    values:
      layout: default

  - scope:
      path: ""
      type: "social-posts"
    values:
      layout: social-posts

  - scope:
      path: "en"
    values:
      lang: "en"

  - scope:
      path: "nl"
    values:
      lang: "nl"

include:
  - admin/
  - _pages/ 

exclude:
  - venv
  - tools
  - .git
  - .jekyll-cache
  - Gemfile.lock
  - .DS_Store
  - .github
  - README.md
  - LICENSE
  
  # Backup en oude mappen
  - _social-posts/nl/old
  - _social-posts/en/old
  - "**/*.bak*"
  - "**/*.bak_clean"
  - "**/*.bak_restore*"
  - "**/*.bak_final*"
  - "**/*.bak_body*"
  - "**/*.bak_test*"
  - "**/*.bak_nuclear*"

rebuild_trigger: v2026-05-31-cleanup