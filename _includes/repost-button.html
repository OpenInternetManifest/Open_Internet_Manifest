<div class="repost-section">
  <h3>Deel dit bericht</h3>
  
  <p class="repost-explain">
    <strong>Korte versie:</strong> Teaser voor X<br>
    <strong>Raw Markdown:</strong> Exacte originele tekst (voor verifier)<br>
    <strong>Unicode:</strong> Mooie opmaak voor Facebook / andere platforms
  </p>

  <div class="repost-buttons">
    <button onclick="copyRepostShort()" class="btn-repost">
      📋 Korte versie (Teaser)
    </button>
    
    <button onclick="copyRawMarkdown()" class="btn-repost">
      📋 Raw Markdown
    </button>

    <button onclick="copyUnicode()" class="btn-repost">
      📋 Unicode opmaak
    </button>

    <button onclick="copyAndOpenFacebook()" class="btn-repost social">
      Kopieer + open Facebook
    </button>

    <button onclick="shareOnX()" class="btn-repost social">
      Post op 𝕏
    </button>
  </div>

  <div id="repost-feedback" class="repost-feedback"></div>
</div>

{% include unicode-converter.html %}

<script>
  const baseUrl = "https://openinternetmanifest.org";
  const title = "{{ page.rvn_title | escape }}";
  const teaser = "{{ page.rvn_teaser | strip_html | escape | replace: '\n', ' ' }}" || "{{ page.content | strip_html | truncatewords: 35 | escape | replace: '\n', ' ' }}";
  const url = baseUrl + "{{ page.url }}";

  function getRawMarkdown() {
    const rawEl = document.getElementById('raw-markdown');
    return rawEl ? rawEl.textContent.trim() : '';
  }

  // ==================== KNOPPEN ====================
  function copyRepostShort() {
    const text = `🔍 ${title}\n\n${teaser}\n\nLees het volledige verhaal: ${url}\n\n#OpenInternetManifest`;
    copyToClipboard(text, "✅ Teaser gekopieerd!");
  }

  function copyRawMarkdown() {
    const raw = getRawMarkdown();
    if (raw) {
      navigator.clipboard.writeText(raw).then(() => {
        showFeedback("✅ Exacte originele Markdown gekopieerd!");
      });
    }
  }

  function copyUnicode() {
    const raw = getRawMarkdown();
    if (raw) {
      const unicodeText = convertToUnicode(raw);
      navigator.clipboard.writeText(unicodeText).then(() => {
        showFeedback("✅ Unicode opmaak gekopieerd!");
      });
    }
  }

  function copyAndOpenFacebook() {
    const raw = getRawMarkdown();
    if (raw) {
      const fbText = convertToUnicode(raw);
      navigator.clipboard.writeText(fbText).then(() => {
        showFeedback("✅ Unicode voor Facebook gekopieerd!");
      });
    }
    setTimeout(() => {
      window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`, '_blank');
    }, 700);
  }

  function shareOnX() {
    const text = `🔍 ${title}\n\n${teaser}\n\nLees het volledige verhaal:\n${url}\n\n#OpenInternetManifest`;
    window.open(`https://x.com/intent/tweet?text=${encodeURIComponent(text)}`, '_blank');
  }

  function copyToClipboard(text, message) {
    navigator.clipboard.writeText(text).then(() => {
      showFeedback(message);
    });
  }

  function showFeedback(message) {
    const feedback = document.getElementById('repost-feedback');
    feedback.innerHTML = message;
    setTimeout(() => { feedback.innerHTML = ''; }, 4000);
  }
</script>
