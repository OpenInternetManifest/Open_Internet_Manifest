<div class="repost-section">
  <h3>Deel dit bericht</h3>
  
  <div class="repost-buttons">
    <button onclick="copyRepostShort()" class="btn-repost">
      рҹ“Ӣ Korte versie 
    </button>
    
    <button onclick="copyRepostFull()" class="btn-repost secondary">
      рҹ“Ӣ Volledige raw tekst (voor verifier)
    </button>

    <button onclick="shareOnX()" class="btn-repost social">
      Post op рқ•Ҹ (korte versie)
    </button>

    <button onclick="copyAndOpenFacebook()" class="btn-repost social">
      Kopieer + open Facebook (mooie opmaak)
    </button>
  </div>

  <div id="repost-feedback" class="repost-feedback"></div>
</div>

<script>
  const baseUrl = "https://openinternetmanifest.org";

  const title = "{{ page.rvn_title | escape }}";
  const url = baseUrl + "{{ page.url }}";

  const shortExcerpt = "{{ page.content | strip_html | truncatewords: 38 | escape | replace: '\n', ' ' }}";

  let fullHtml = `{{ page.content | replace: '\\', '\\\\' | replace: '"', '\\"' | replace: '\n', '\\n' | replace: '`', '\\`' }}`;

  function htmlToMarkdown(html) {
    return html
      .replace(/<hr\s*\/?>/gi, '\n---\n')
      .replace(/<h[1-6][^>]*>/gi, '\n### ')
      .replace(/<\/h[1-6]>/gi, '\n')
      .replace(/<p>/gi, '\n')
      .replace(/<\/p>/gi, '')
      .replace(/<strong>/gi, '**')
      .replace(/<\/strong>/gi, '**')
      .replace(/<em>/gi, '*')
      .replace(/<\/em>/gi, '*')
      .replace(/<ul>|<ol>/gi, '\n')
      .replace(/<\/ul>|<\/ol>/gi, '\n')
      .replace(/<li>/gi, '\n- ')
      .replace(/<\/li>/gi, '\n')
      .replace(/<br\s*\/?>/gi, '\n')
      .replace(/&nbsp;/g, ' ')
      .replace(/&amp;/g, '&')
      .replace(/&lt;/g, '<')
      .replace(/&gt;/g, '>')
      .replace(/\n{3,}/g, '\n\n')
      .replace(/^\n+|\n+$/g, '')
      .trim();
  }

  const fullRawText = htmlToMarkdown(fullHtml);

  // === Mooie Unicode bold voor Facebook ===
  function toFacebookUnicode(text) {
    const boldMap = {
      'A':'рқҗҖ','B':'рқҗҒ','C':'рқҗӮ','D':'рқҗғ','E':'рқҗ„','F':'рқҗ…','G':'рқҗҶ','H':'рқҗҮ','I':'рқҗҲ',
      'J':'рқҗү','K':'рқҗҠ','L':'рқҗӢ','M':'рқҗҢ','N':'рқҗҚ','O':'рқҗҺ','P':'рқҗҸ','Q':'рқҗҗ','R':'рқҗ‘',
      'S':'рқҗ’','T':'рқҗ“','U':'рқҗ”','V':'рқҗ•','W':'рқҗ–','X':'рқҗ—','Y':'рқҗҳ','Z':'рқҗҷ',
      'a':'рқҗҡ','b':'рқҗӣ','c':'рқҗң','d':'рқҗқ','e':'рқҗһ','f':'рқҗҹ','g':'рқҗ ','h':'рқҗЎ','i':'рқҗў',
      'j':'рқҗЈ','k':'рқҗӨ','l':'рқҗҘ','m':'рқҗҰ','n':'рқҗ§','o':'рқҗЁ','p':'рқҗ©','q':'рқҗӘ','r':'рқҗ«',
      's':'рқҗ¬','t':'рқҗӯ','u':'рқҗ®','v':'рқҗҜ','w':'рқҗ°','x':'рқҗұ','y':'рқҗІ','z':'рқҗі'
    };
    return text.replace(/\*\*(.+?)\*\*/g, (_, p1) => 
      p1.split('').map(c => boldMap[c] || c).join('')
    );
  }

  function copyRepostShort() { /* blijft hetzelfde */ 
    const text = `рҹ”Қ ${title}\n\n${shortExcerpt}...\n\nLees + verificatie: ${url}\n\n#OpenInternetManifest`;
    copyToClipboard(text, "вң… Korte versie gekopieerd!");
  }

  function copyRepostFull() {
    const text = `рҹ”Қ ${title}\n\n${fullRawText}`;
    copyToClipboard(text, "вң… Volledige raw tekst (verifieerbaar) gekopieerd!");
  }

  function shareOnX() { /* blijft hetzelfde */ 
    const text = `рҹ”Қ ${title} вҖ” ${shortExcerpt.substring(0, 160)}...`;
    const shareUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}&url=${encodeURIComponent(url)}`;
    window.open(shareUrl, '_blank');
  }

  function copyAndOpenFacebook() {
    const fbText = `рҹ”Қ ${title}\n\n${toFacebookUnicode(fullRawText)}`;
    navigator.clipboard.writeText(fbText).then(() => {
      const feedback = document.getElementById('repost-feedback');
      feedback.innerHTML = "вң… Unicode-opmaak voor Facebook gekopieerd!";
      setTimeout(() => { feedback.innerHTML = ''; }, 3000);
    });
    setTimeout(() => {
      window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`, '_blank');
    }, 800);
  }

  function copyToClipboard(text, message) {
    navigator.clipboard.writeText(text).then(() => {
      const feedback = document.getElementById('repost-feedback');
      feedback.innerHTML = message;
      setTimeout(() => { feedback.innerHTML = ''; }, 4000);
    });
  }
</script>
