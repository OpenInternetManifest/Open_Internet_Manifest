name: Process New RVN

on:
  issues:
    types: [opened]

jobs:
  process-rvn:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if RVN
        id: check
        run: |
          echo "Issue title: ${{ github.event.issue.title }}"
          if [[ "${{ github.event.issue.title }}" == *"[RVN"* ]]; then
            echo "is_rvn=true" >> $GITHUB_OUTPUT
            echo "✅ Detected as RVN issue"
          else
            echo "is_rvn=false" >> $GITHUB_OUTPUT
            echo "❌ Not an RVN issue"
          fi

      - name: Determine next day
        id: nextday
        if: steps.check.outputs.is_rvn == 'true'
        run: |
          HIGHEST=$(find _social-posts -name "day-*-rvn.md" 2>/dev/null | sed 's/.*day-\([0-9]*\)-rvn.md/\1/' | sort -n | tail -1 || echo "0")
          NEXT=$((HIGHEST + 1))
          echo "next_day=$NEXT" >> $GITHUB_OUTPUT
          echo "Next day number: $NEXT"

      - name: Extract data
        id: extract
        if: steps.check.outputs.is_rvn == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const cleanTitle = issue.title.replace(/^\[.*?\]\s*/, '').trim();
            core.setOutput('rvn_title', cleanTitle);
            core.setOutput('body', issue.body || '');
            console.log("Extracted title:", cleanTitle);

      - name: Create RVN files
        if: steps.check.outputs.is_rvn == 'true'
        run: |
          echo "Creating files for day ${{ steps.nextday.outputs.next_day }}"
          
          # Save the full body safely to a file
          cat > /tmp/rvn_body.txt << 'BODY_END'
          ${{ steps.extract.outputs.body }}
          BODY_END

          # Run the script with the temp file
          .github/scripts/create-rvn.sh \
            ${{ steps.nextday.outputs.next_day }} \
            "${{ steps.extract.outputs.rvn_title }}" \
            "/tmp/rvn_body.txt"

          echo "=== File contents check ==="
          ls -l _social-posts/en/day-${{ steps.nextday.outputs.next_day }}-rvn.md
          head -n 40 _social-posts/en/day-${{ steps.nextday.outputs.next_day }}-rvn.md

      - name: Create Pull Request
        if: steps.check.outputs.is_rvn == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.PAT_TOKEN }}
          title: "RVN Day ${{ steps.nextday.outputs.next_day }} - ${{ steps.extract.outputs.rvn_title }}"
          body: "Created automatically from Issue"
          branch: rvn-day-${{ steps.nextday.outputs.next_day }}
          labels: pending-review
          delete-branch: true