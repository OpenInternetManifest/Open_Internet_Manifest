name: Process New RVN

on:
  issues:
    types: [opened]

jobs:
  process-rvn:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if RVN
        id: check
        run: |
          if [[ "${{ github.event.issue.title }}" == *"[RVN"* ]]; then
            echo "is_rvn=true" >> $GITHUB_OUTPUT
          else
            echo "is_rvn=false" >> $GITHUB_OUTPUT
          fi

      - name: Determine next day
        id: nextday
        if: steps.check.outputs.is_rvn == 'true'
        run: |
          HIGHEST=$(find _social-posts -name "day-*-rvn.md" 2>/dev/null | sed 's/.*day-\([0-9]*\)-rvn.md/\1/' | sort -n | tail -1 || echo "0")
          echo "next_day=$((HIGHEST + 1))" >> $GITHUB_OUTPUT

      - name: Extract data
        id: extract
        if: steps.check.outputs.is_rvn == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const cleanTitle = issue.title.replace(/^\[.*?\]\s*/, '').trim();
            core.setOutput('rvn_title', cleanTitle);
            core.setOutput('body', issue.body || '');

      - name: Create RVN files
        if: steps.check.outputs.is_rvn == 'true'
        run: .github/scripts/create-rvn.sh ${{ steps.nextday.outputs.next_day }} "${{ steps.extract.outputs.rvn_title }}" "${{ steps.extract.outputs.body }}"

      - name: Create Pull Request
        if: steps.check.outputs.is_rvn == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "RVN Day ${{ steps.nextday.outputs.next_day }}"
          body: "Created from Issue"
          branch: rvn-day-${{ steps.nextday.outputs.next_day }}
          labels: pending-review
          delete-branch: true