name: Process New RVN

on:
  issues:
    types: [opened]

jobs:
  process-rvn:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if RVN
        id: check
        run: |
          if [[ "${{ github.event.issue.title }}" == *"[RVN"* ]]; then
            echo "is_rvn=true" >> $GITHUB_OUTPUT
          else
            echo "is_rvn=false" >> $GITHUB_OUTPUT
          fi

      - name: Determine next day
        id: nextday
        if: steps.check.outputs.is_rvn == 'true'
        run: |
          HIGHEST=$(find _social-posts -name "day-*-rvn.md" 2>/dev/null | sed 's/.*day-\([0-9]*\)-rvn.md/\1/' | sort -n | tail -1 || echo "0")
          echo "next_day=$((HIGHEST + 1))" >> $GITHUB_OUTPUT

      - name: Create files
        if: steps.check.outputs.is_rvn == 'true'
        run: |
          DAY=${{ steps.nextday.outputs.next_day }}
          TITLE="${{ github.event.issue.title }}"
          
          # English
          echo "---" > _social-posts/en/day-${DAY}-rvn.md
          echo "layout: social-posts" >> _social-posts/en/day-${DAY}-rvn.md
          echo "lang: en" >> _social-posts/en/day-${DAY}-rvn.md
          echo "day: ${DAY}" >> _social-posts/en/day-${DAY}-rvn.md
          echo "rvn_title: \"${TITLE}\"" >> _social-posts/en/day-${DAY}-rvn.md
          echo "rvn_teaser: \"\"" >> _social-posts/en/day-${DAY}-rvn.md
          echo "website_sha256: \"\"" >> _social-posts/en/day-${DAY}-rvn.md
          echo "social_x_sha256: \"\"" >> _social-posts/en/day-${DAY}-rvn.md
          echo "---" >> _social-posts/en/day-${DAY}-rvn.md
          echo "${{ github.event.issue.body }}" >> _social-posts/en/day-${DAY}-rvn.md

          # Dutch
          echo "---" > _social-posts/nl/day-${DAY}-rvn.md
          echo "layout: social-posts" >> _social-posts/nl/day-${DAY}-rvn.md
          echo "lang: nl" >> _social-posts/nl/day-${DAY}-rvn.md
          echo "day: ${DAY}" >> _social-posts/nl/day-${DAY}-rvn.md
          echo "rvn_title: \"${TITLE}\"" >> _social-posts/nl/day-${DAY}-rvn.md
          echo "rvn_teaser: \"\"" >> _social-posts/nl/day-${DAY}-rvn.md
          echo "website_sha256: \"\"" >> _social-posts/nl/day-${DAY}-rvn.md
          echo "social_x_sha256: \"\"" >> _social-posts/nl/day-${DAY}-rvn.md
          echo "---" >> _social-posts/nl/day-${DAY}-rvn.md
          echo "${{ github.event.issue.body }}" >> _social-posts/nl/day-${DAY}-rvn.md

      - name: Commit & PR
        if: steps.check.outputs.is_rvn == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          title: "RVN Day ${{ steps.nextday.outputs.next_day }}"
          body: "Created from Issue"
          branch: rvn-day-${{ steps.nextday.outputs.next_day }}
          labels: pending-review