name: Process New RVN

on:
  issues:
    types: [opened]

jobs:
  process-rvn:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if RVN
        id: check
        run: |
          echo "Issue title: ${{ github.event.issue.title }}"
          if [[ "${{ github.event.issue.title }}" == *"[RVN"* ]]; then
            echo "is_rvn=true" >> $GITHUB_OUTPUT
            echo "✅ Detected as RVN issue"
          else
            echo "is_rvn=false" >> $GITHUB_OUTPUT
            echo "❌ Not an RVN issue"
          fi

      - name: Determine next day number
        id: nextday
        if: steps.check.outputs.is_rvn == 'true'
        run: |
          HIGHEST=$(find _social-posts -name "day-*-rvn.md" 2>/dev/null | sed 's/.*day-\([0-9]*\)-rvn.md/\1/' | sort -n | tail -1 || echo "0")
          # Also check open PR branches for pending days
          PENDING=$(git ls-remote --heads origin "rvn-day-*" | sed 's/.*rvn-day-//' | sort -n | tail -1 || echo "0")
          NEXT=$(( HIGHEST > PENDING ? HIGHEST + 1 : PENDING + 1 ))
          echo "next_day=$NEXT" >> $GITHUB_OUTPUT
          echo "Highest on main: $HIGHEST | Pending: $PENDING | Next: $NEXT"

      - name: Extract data
        id: extract
        if: steps.check.outputs.is_rvn == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const cleanTitle = issue.title.replace(/^\[.*?\]\s*/, '').trim();
            core.setOutput('rvn_title', cleanTitle);
            core.setOutput('body', issue.body || '');
            console.log("Extracted title:", cleanTitle);

      - name: Create RVN files
        if: steps.check.outputs.is_rvn == 'true'
        run: |
          echo "Creating files for day ${{ steps.nextday.outputs.next_day }}"
          
          # Save the full body safely to a temp file (this is the most reliable way)
          cat > /tmp/rvn_body.txt << 'EOF'
          ${{ steps.extract.outputs.body }}
          EOF

          # Run the script
          .github/scripts/create-rvn.sh \
            ${{ steps.nextday.outputs.next_day }} \
            "${{ steps.extract.outputs.rvn_title }}" \
            "/tmp/rvn_body.txt"

          echo "=== File contents check (EN) ==="
          ls -l _social-posts/en/day-${{ steps.nextday.outputs.next_day }}-rvn.md || echo "EN file not found"
          head -n 50 _social-posts/en/day-${{ steps.nextday.outputs.next_day }}-rvn.md || echo "Could not read EN file"

          echo "=== File contents check (NL) ==="
          ls -l _social-posts/nl/day-${{ steps.nextday.outputs.next_day }}-rvn.md || echo "NL file not found"
          head -n 50 _social-posts/nl/day-${{ steps.nextday.outputs.next_day }}-rvn.md || echo "Could not read NL file"
      
      - name: Create Pull Request
        if: steps.check.outputs.is_rvn == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.PAT_TOKEN }}
          title: "RVN Day ${{ steps.nextday.outputs.next_day }} - ${{ steps.extract.outputs.rvn_title }}"
          body: "Created automatically from Issue #${{ github.event.issue.number }}"
          branch: rvn-day-${{ steps.nextday.outputs.next_day }}
          labels: pending-review
          delete-branch: true