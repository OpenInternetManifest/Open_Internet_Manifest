name: Process New Contribution

on:
  issues:
    types: [opened]

jobs:
  process-contribution:
    if: contains(github.event.issue.labels.*.name, 'rvn') || 
        contains(github.event.issue.labels.*.name, 'teaser') || 
        contains(github.event.issue.labels.*.name, 'thesis') || 
        contains(github.event.issue.labels.*.name, 'guide')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract issue data
        id: extract
        run: |
          echo "Issue Title: ${{ github.event.issue.title }}"
          echo "Issue Body: ${{ github.event.issue.body }}"
          echo "Labels: ${{ toJson(github.event.issue.labels.*.name) }}"
          echo "Template: ${{ github.event.issue.title }}"

      - name: Post comment on issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Bedankt voor je bijdrage! Ik ben bezig met het verwerken van je ' + 
                    'RVN/Thesis/Gids. Er wordt een Pull Request aangemaakt met het juiste nummer.'
            })