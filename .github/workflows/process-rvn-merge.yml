name: Process RVN Merge

on:
  push:
    branches: [ main ]
    paths:
      - '_social-posts/**/day-*.md'

permissions:
  contents: write

jobs:
  process-rvn:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Calculate hashes for changed RVN files
        run: |
          chmod +x .github/scripts/calculate-hashes.sh
          
          echo "🔍 Checking changed files..."
          CHANGED_FILES=$(git diff --name-only HEAD^ | grep -E '_social-posts/.*/day-.*\.md' || echo "")

          if [ -z "$CHANGED_FILES" ]; then
            echo "No RVN files changed"
          else
            for file in $CHANGED_FILES; do
              echo "→ Processing $file"
              .github/scripts/calculate-hashes.sh "$file"
            done
          fi

      - name: Commit & Push updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add _social-posts/ static/js/official-clean-texts.js
            git commit -m "chore: update hashes + raw_markdown after merge [skip ci]"
            git push
            echo "✅ Changes committed and pushed"
          fi