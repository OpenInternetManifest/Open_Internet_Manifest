name: Process RVN on Merge

on:
  pull_request:
    types: [closed]

jobs:
  process-rvn-merge:
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.title, 'RVN')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Git
        run: |
          git config user.name "OIM Bot"
          git config user.email "bot@openinternetmanifest.org"

      - name: Calculate hashes and clean placeholders
        run: |
          echo "🔍 Starting hash calculation and placeholder cleanup for merged RVN files..."

          FILES=$(git diff --name-only HEAD~1 HEAD | grep -E '_social-posts/.*/day-[0-9]+-rvn\.md$' || echo "")

          if [ -z "$FILES" ]; then
            echo "No RVN files changed. Skipping."
            exit 0
          fi

          for file in $FILES; do
            echo "Processing: $file"

            # Run hash calculation
            HASHES=$(.github/scripts/calculate-hashes.sh "$file")

            website_sha256=$(echo "$HASHES" | grep '^WEBSITE_SHA256=' | cut -d= -f2)
            fuzzy_sha256=$(echo "$HASHES" | grep '^FUZZY_SHA256=' | cut -d= -f2)
            git_commit_hash=$(echo "$HASHES" | grep '^GIT_COMMIT_HASH=' | cut -d= -f2)
            git_commit_url=$(echo "$HASHES" | grep '^GIT_COMMIT_URL=' | cut -d= -f2)
            git_commit_date=$(echo "$HASHES" | grep '^GIT_COMMIT_DATE=' | cut -d= -f2)

            # Update hashes
            sed -i "s|website_sha256: \".*\"|website_sha256: \"${website_sha256}\"|" "$file"
            sed -i "s|social_x_sha256: \".*\"|social_x_sha256: \"${fuzzy_sha256}\"|" "$file"
            sed -i "s|social_fb_sha256: \".*\"|social_fb_sha256: \"${fuzzy_sha256}\"|" "$file"
            sed -i "s|social_share_sha256: \".*\"|social_share_sha256: \"${fuzzy_sha256}\"|" "$file"
            sed -i "s|git_commit_hash: \".*\"|git_commit_hash: \"${git_commit_hash}\"|" "$file"
            sed -i "s|git_commit_url: \".*\"|git_commit_url: \"${git_commit_url}\"|" "$file"
            sed -i "s|git_commit_date: \".*\"|git_commit_date: \"${git_commit_date}\"|" "$file"

            # Clean English placeholders if they are still "_No response_" or empty
            sed -i 's|rvn_title: "_No response_"|rvn_title: "This post has not been translated into English yet."|' "$file"
            sed -i 's|rvn_teaser: "_No response_"|rvn_teaser: "Translation coming soon."|' "$file"
            sed -i 's|rvn_title: ""|rvn_title: "This post has not been translated into English yet."|' "$file"
            sed -i 's|rvn_teaser: ""|rvn_teaser: "Translation coming soon."|' "$file"

            echo "✅ Hashes and placeholders updated in $file"
          done

      - name: Commit updated hashes and placeholders
        run: |
          git add _social-posts/*/day-*-rvn.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Add/refresh integrity hashes and clean English placeholders after RVN merge"
            git push
            echo "🚀 Changes committed to main"
          fi