name: Process RVN on Merge

on:
  pull_request:
    types: [closed]

jobs:
  process-rvn-merge:
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'pending-review')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Check if this is a merged RVN PR
        id: check
        run: |
          if git log --oneline -1 | grep -q "RVN Day"; then
            echo "is_rvn_merge=true" >> $GITHUB_OUTPUT
            echo "✅ This is a merged RVN PR"
          else
            echo "is_rvn_merge=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Git
        if: steps.check.outputs.is_rvn_merge == 'true'
        run: |
          git config user.name "OIM Bot"
          git config user.email "bot@openinternetmanifest.org"

      - name: Calculate hashes and update files
        if: steps.check.outputs.is_rvn_merge == 'true'
        run: |
          # Find the RVN files that were just merged
          FILES=$(git diff --name-only HEAD~1 HEAD | grep -E 'day-[0-9]+-rvn\.md$' || echo "")
          
          for file in $FILES; do
            echo "Processing $file"
            
            # Calculate SHA256 of the content (without frontmatter hashes)
            CONTENT_HASH=$(sed '/^website_sha256:/,/^git_commit_/d' "$file" | sha256sum | awk '{print $1}')
            
            COMMIT_HASH=$(git rev-parse HEAD)
            COMMIT_URL="https://github.com/OpenInternetManifest/Open_Internet_Manifest/commit/${COMMIT_HASH}"
            COMMIT_DATE=$(git log -1 --format=%cd --date=iso)
            
            # Update the file with hashes
            sed -i "s|website_sha256: \"\"|website_sha256: \"${CONTENT_HASH}\"|" "$file"
            sed -i "s|git_commit_hash: \"\"|git_commit_hash: \"${COMMIT_HASH}\"|" "$file"
            sed -i "s|git_commit_url: \"\"|git_commit_url: \"${COMMIT_URL}\"|" "$file"
            sed -i "s|git_commit_date: \"\"|git_commit_date: \"${COMMIT_DATE}\"|" "$file"
            
            echo "Updated hashes for $file"
          done

      - name: Commit updated hashes
        if: steps.check.outputs.is_rvn_merge == 'true'
        run: |
          git add _social-posts/en/day-*-rvn.md _social-posts/nl/day-*-rvn.md
          git commit -m "Add integrity hashes and git info to merged RVN" || echo "No changes to commit"
          git push