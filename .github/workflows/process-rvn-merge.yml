name: Process RVN Merge + Deploy

on:
  push:
    branches: [ main ]
    paths:
      - '_social-posts/**/day-*.md'

permissions:
  contents: write

jobs:
  process-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Calculate hashes
        run: |
          chmod +x .github/scripts/calculate-hashes.sh
          
          CHANGED=$(git diff --name-only HEAD^ | grep -E '_social-posts/.*/day-.*\.md' || echo "")
          if [ -n "$CHANGED" ]; then
            for file in $CHANGED; do
              echo "→ Processing $file"
              .github/scripts/calculate-hashes.sh "$file"
            done
          fi

      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet; then
            echo "No changes"
          else
            git add _social-posts/ static/js/official-clean-texts.js
            git commit -m "chore: update hashes + raw_markdown [skip ci]"
            git push
            echo "✅ Hashes committed"
          fi

      - name: Build and Deploy Jekyll
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          force_orphan: true
          publish_branch: gh-pages