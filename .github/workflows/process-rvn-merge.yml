name: Process RVN on Merge

on:
  pull_request:
    types: [closed]

jobs:
  process-rvn-merge:
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'pending-review')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Git
        run: |
          git config user.name "OIM Bot"
          git config user.email "bot@openinternetmanifest.org"

      - name: Calculate hashes and update files
        run: |
          echo "Starting hash calculation for merged RVN files..."

          # Find RVN files changed in this merge
          FILES=$(git diff --name-only HEAD~1 HEAD | grep -E '_social-posts/.*/day-[0-9]+-rvn\.md$' || echo "")

          for file in $FILES; do
            echo "Processing: $file"

            # Extract content after frontmatter
            raw_content=$(sed -n '/^---$/,/^---$/!p' "$file" | tail -n +2)

            # Create fuzzy canonical text (same for all social platforms)
            fuzzy=$(echo "$raw_content" | \
              sed '/^$/d' | \
              sed 's/^[ \t]*//g' | \
              sed 's/[ \t]*$//g' | \
              tr -d '\r' | \
              tr '[:upper:]' '[:lower:]' | \
              sed 's/[ \t]\+/ /g' | \
              sed '/^$/d')

            # Calculate hashes
            website_hash=$(echo -n "$raw_content" | sha256sum | awk '{print $1}')
            fuzzy_hash=$(echo -n "$fuzzy" | sha256sum | awk '{print $1}')

            commit_hash=$(git rev-parse HEAD)
            commit_url="https://github.com/OpenInternetManifest/Open_Internet_Manifest/commit/${commit_hash}"
            commit_date=$(git log -1 --format=%cd --date=iso-strict)

            # Update frontmatter
            sed -i "s|website_sha256: \"\"|website_sha256: \"${website_hash}\"|" "$file"
            sed -i "s|social_x_sha256: \"\"|social_x_sha256: \"${fuzzy_hash}\"|" "$file"
            sed -i "s|social_fb_sha256: \"\"|social_fb_sha256: \"${fuzzy_hash}\"|" "$file"
            sed -i "s|social_share_sha256: \"\"|social_share_sha256: \"${fuzzy_hash}\"|" "$file"
            sed -i "s|git_commit_hash: \"\"|git_commit_hash: \"${commit_hash}\"|" "$file"
            sed -i "s|git_commit_url: \"\"|git_commit_url: \"${commit_url}\"|" "$file"
            sed -i "s|git_commit_date: \"\"|git_commit_date: \"${commit_date}\"|" "$file"

            echo "✓ Hashes added to $file"
            echo "  Website hash : ${website_hash:0:16}..."
            echo "  Fuzzy hash   : ${fuzzy_hash:0:16}..."
          done

      - name: Commit updated hashes
        run: |
          git add _social-posts/*/day-*-rvn.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Add integrity hashes and git info to merged RVN posts"
            git push
            echo "✅ Hashes committed to main"
          fi