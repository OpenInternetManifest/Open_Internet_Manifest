name: "Guide Add (English)"
description: Add a practical guide to the Open Internet Manifest.
title: "[Guide EN] "
labels: ["guide", "pending-review", "en"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for your contribution!  
        The number, difficulty level and hashes will be added automatically.

  - type: dropdown
    id: language
    attributes:
      label: Language
      options:
        - en
      default: 0
    validations:
      required: true

  - type: input
    id: guide_title
    attributes:
      label: Guide Title
      placeholder: "Setting up your own Umbrel node in 30 minutes"
    validations:
      required: true

  - type: dropdown
    id: difficulty
    attributes:
      label: Difficulty Level
      options:
        - beginner
        - intermediate
        - advanced
      default: 0
    validations:
      required: true

  - type: textarea
    id: guide_teaser
    attributes:
      label: Short Description / Teaser
      description: A short introduction to the guide (1-3 sentences)
      placeholder: "Learn how to install a full Umbrel node on an old Intel NUC without being a Linux expert."
    validations:
      required: true

  - type: textarea
    id: body
    attributes:
      label: Full Guide (Markdown)
      description: Write the complete step-by-step guide here.
      placeholder: |
        ## What do you need?
        
        - An old computer or NUC
        - A USB stick with at least 16GB
      render: markdown
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Extra notes for the core team (optional)
      description: |
        For example: "Includes screenshots" or "Please check security aspects"
    validations:
      required: false