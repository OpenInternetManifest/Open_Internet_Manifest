name: "Thesis toevoegen (Nederlands)"
description: Voeg een harde stelling toe aan het Open Internet Manifest.
title: "[Thesis NL] "
labels: ["thesis", "pending-review", "nl"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Bedankt voor je bijdrage!  
        Het nummer en hashes worden automatisch toegevoegd nadat de thesis is goedgekeurd.

  - type: dropdown
    id: language
    attributes:
      label: Taal
      options:
        - nl
      default: 0
    validations:
      required: true

  - type: input
    id: thesis_title
    attributes:
      label: Thesis (de stelling)
      placeholder: "Big Tech is niet je vriend, het is je verhuurder."
    validations:
      required: true

  - type: textarea
    id: explanation
    attributes:
      label: Korte toelichting (optioneel)
      description: Een korte uitleg of onderbouwing van de stelling (max 4-6 zinnen)
      placeholder: |
        Ze verzamelen niet alleen data — ze bepalen wat je mag zien, denken en kopen.
      render: markdown
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Extra opmerkingen voor het core team (optioneel)
      description: |
        Bijvoorbeeld: "Past bij thesis 12" of "Graag controleren op feit X"
    validations:
      required: false