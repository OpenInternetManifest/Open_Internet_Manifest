name: "Add RVN (English)"
description: Add a new Reality vs Narrative post in English.
title: "[RVN EN] "
labels: ["rvn", "pending-review", "en"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for your contribution!  
        Day number, hashes, filename and other metadata will be added automatically.

  - type: dropdown
    id: language
    attributes:
      label: Language
      options:
        - en
      default: 0
    validations:
      required: true

  - type: input
    id: rvn_title
    attributes:
      label: RVN Title
      placeholder: "1 April – New Year’s Day in the old 13-month calendar"
    validations:
      required: true

  - type: textarea
    id: rvn_teaser
    attributes:
      label: Teaser
      description: Short summary (1-3 sentences) that sparks curiosity. This is used in the overview cards.
      placeholder: "Why do we still celebrate April 1st as April Fools’ Day while it was once New Year’s Day?"
    validations:
      required: true

  - type: textarea
    id: body
    attributes:
      label: Full RVN text (Markdown)
      description: |
        Write your full Reality vs Narrative post here.
        
        Use Markdown for formatting:
        - Headings start with ### 
        - **Bold** text
        - Lists with - or *
        - Blockquotes with >
        
        [→ Markdown cheatsheet (opens in new tab)](https://www.markdownguide.org/cheat-sheet/)
      placeholder: |
        Why do we actually celebrate April 1st as "fools day"?
        
        While it was once New Year’s Day?
    validations:
      required: true

  - type: input
    id: donation_link
    attributes:
      label: Donation link (optional)
      description: E.g. Ko-fi, Monero, BTC or Stripe link
      placeholder: "https://ko-fi.com/yourname"
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Extra notes for the core team (optional)
      description: |
        For example: "Related to guide X" or "Please check fact Y"
    validations:
      required: false