name: "RVN Add (English)"
description: Add a new Reality vs Narrative post in English.
title: "[RVN EN] "
labels: ["rvn", "pending-review", "en"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for contributing!  
        Fill in the fields below. Day number, hashes and filename will be added automatically.

  - type: dropdown
    id: language
    attributes:
      label: Language
      options:
        - en
      default: 0
    validations:
      required: true

  - type: input
    id: rvn_title
    attributes:
      label: RVN Title
      placeholder: "April 1st – New Year's Day in the old 13-month calendar"
    validations:
      required: true

  - type: textarea
    id: rvn_teaser
    attributes:
      label: Teaser
      description: Short summary (1-3 sentences) to spark curiosity
      placeholder: "Why do we still celebrate April 1st as April Fools’ Day when it used to be New Year’s Day?"
    validations:
      required: true

  - type: textarea
    id: body
    attributes:
      label: Full RVN text (Markdown)
      description: Write your full Reality vs Narrative post here
      render: markdown
    validations:
      required: true

  - type: input
    id: donation_link
    attributes:
      label: Donation link (optional)
      description: Ko-fi, Monero, BTC or Stripe link
      placeholder: "https://ko-fi.com/yourname"
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Extra notes for the core team (optional)
      description: For example; "Related to guide X" or "Please check fact Y"
    validations:
      required: false