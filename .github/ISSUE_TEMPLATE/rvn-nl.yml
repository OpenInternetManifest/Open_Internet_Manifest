name: Process RVN on Merge

on:
  pull_request:
    types: [closed]

jobs:
  process-rvn-merge:
    if: github.event.pull_request.merged == true && contains(github.event.pull_request.title, 'RVN')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Git
        run: |
          git config user.name "OIM Bot"
          git config user.email "bot@openinternetmanifest.org"

      - name: Clean body, placeholders and calculate hashes
        run: |
          echo "🔍 Starting final strict body cleanup..."

          # Bepaal of dit een Engelse template is
          IS_ENGLISH=$(echo "${{ github.event.pull_request.title }}" | grep -i "EN" && echo "true" || echo "false")

          FILES=$(git diff --name-only HEAD~1 HEAD | grep -E '_social-posts/.*/day-[0-9]+-rvn\.md$' || echo "")

          if [ -z "$FILES" ]; then
            echo "No RVN files changed. Skipping."
            exit 0
          fi

          for file in $FILES; do
            echo "Processing: $file (English template: $IS_ENGLISH)"

            # === Zeer strenge body cleanup ===
            # Verwijder alle mogelijke form headers
            sed -i '/^### .*RVN .*text.*Markdown.*$/d' "$file"
            sed -i '/^### Volledige RVN tekst (Nederlands – Markdown)/d' "$file"
            sed -i '/^### Full RVN text (English – Markdown)/d' "$file"
            sed -i '/^### RVN Titel (Nederlands)/d' "$file"
            sed -i '/^### RVN Title (English)/d' "$file"
            sed -i '/^### Teaser (Nederlands)/d' "$file"
            sed -i '/^### Teaser (English)/d' "$file"
            sed -i '/^### Donatie link/d' "$file"
            sed -i '/^### Donation link/d' "$file"
            sed -i '/^### Extra opmerkingen/d' "$file"
            sed -i '/^### Extra notes/d' "$file"

            # Verwijder _No response_ en markdown fences
            sed -i '/^_No response_$/d' "$file"
            sed -i '/^```markdown$/d' "$file"
            sed -i '/^```$/d' "$file"

            # Verwijder lege regels direct na frontmatter
            sed -i '/^---$/N; /^\n---$/d' "$file"
            sed -i '/^---\s*$/N; /^\n---\s*$/d' "$file"

            # === Nette English placeholders ===
            sed -i 's|rvn_title: "_No response_"|rvn_title: "This post has not been translated into English yet."|' "$file"
            sed -i 's|rvn_teaser: "_No response_"|rvn_teaser: "Translation coming soon."|' "$file"
            sed -i 's|rvn_title: ""|rvn_title: "This post has not been translated into English yet."|' "$file"
            sed -i 's|rvn_teaser: ""|rvn_teaser: "Translation coming soon."|' "$file"

            # === Calculate and update hashes ===
            HASHES=$(.github/scripts/calculate-hashes.sh "$file")

            website_sha256=$(echo "$HASHES" | grep '^WEBSITE_SHA256=' | cut -d= -f2)
            fuzzy_sha256=$(echo "$HASHES" | grep '^FUZZY_SHA256=' | cut -d= -f2)
            git_commit_hash=$(echo "$HASHES" | grep '^GIT_COMMIT_HASH=' | cut -d= -f2)
            git_commit_url=$(echo "$HASHES" | grep '^GIT_COMMIT_URL=' | cut -d= -f2)
            git_commit_date=$(echo "$HASHES" | grep '^GIT_COMMIT_DATE=' | cut -d= -f2)

            sed -i "s|website_sha256: \".*\"|website_sha256: \"${website_sha256}\"|" "$file"
            sed -i "s|social_x_sha256: \".*\"|social_x_sha256: \"${fuzzy_sha256}\"|" "$file"
            sed -i "s|social_fb_sha256: \".*\"|social_fb_sha256: \"${fuzzy_sha256}\"|" "$file"
            sed -i "s|social_share_sha256: \".*\"|social_share_sha256: \"${fuzzy_sha256}\"|" "$file"
            sed -i "s|git_commit_hash: \".*\"|git_commit_hash: \"${git_commit_hash}\"|" "$file"
            sed -i "s|git_commit_url: \".*\"|git_commit_url: \"${git_commit_url}\"|" "$file"
            sed -i "s|git_commit_date: \".*\"|git_commit_date: \"${git_commit_date}\"|" "$file"

            # Extra: zorg dat donation_link niet in body terechtkomt
            sed -i '/^donation_link:/d' "$file"   # verwijder als het per ongeluk in body staat

            echo "✅ Body cleaned and hashes updated in $file"
          done

      - name: Commit updated files
        run: |
          git add _social-posts/*/day-*-rvn.md
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Final RVN body cleanup and hash refresh after merge"
            git push
            echo "🚀 Changes committed to main"
          fi