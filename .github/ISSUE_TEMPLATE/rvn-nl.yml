name: "RVN toevoegen (Nederlands)"
description: Voeg een nieuwe Reality vs Narrative post toe in het Nederlands.
title: "[RVN NL] "
labels: ["rvn", "pending-review", "nl"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Bedankt voor je bijdrage!  
        Nummer, hashes, dag-nummer en bestandsnaam worden automatisch toegevoegd.

  - type: dropdown
    id: language
    attributes:
      label: Taal
      options:
        - nl
      default: 0
    validations:
      required: true

  - type: input
    id: rvn_title
    attributes:
      label: RVN Titel
      placeholder: "1 april – Nieuwjaarsdag in het oude 13-maanden stelsel"
    validations:
      required: true

  - type: textarea
    id: rvn_teaser
    attributes:
      label: Teaser
      description: Korte samenvatting (1-3 zinnen) die nieuwsgierigheid opwekt
      placeholder: "Waarom vieren we 1 april eigenlijk nog als April Fools’ Day terwijl het ooit Nieuwjaarsdag was?"
    validations:
      required: true

  - type: textarea
    id: body
    attributes:
      label: Volledige RVN tekst (Markdown)
      description: |
        Schrijf hier je volledige post.
        [→ Markdown cheatsheet](https://www.markdownguide.org/cheat-sheet/) (nieuw tabblad)
      placeholder: |
        Het is 1 april 2026.
        
        Voor de meeste mensen is dit April Fools’ Day: een dag van grappen en gekkigheid.
      render: markdown
    validations:
      required: true

  - type: input
    id: donation_link
    attributes:
      label: Donatie link (optioneel)
      description: Bijv. Ko-fi, Monero, BTC of Stripe link
      placeholder: "https://ko-fi.com/jouwnaam"
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Extra opmerkingen voor het core team (optioneel)
      description: |
        Bijvoorbeeld: "Gerelateerd aan guide X" of "Graag controleren op feit Y"
    validations:
      required: false