name: "RVN toevoegen (Nederlands)"
description: Voeg een nieuwe Reality vs Narrative post toe in het Nederlands.
title: "[RVN NL] "
labels: ["rvn", "pending-review", "nl"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Bedankt voor je bijdrage!  
        Vul hieronder de velden in. Nummer, hashes en bestandsnaam worden automatisch toegevoegd.

  - type: dropdown
    id: language
    attributes:
      label: Taal
      options:
        - nl
      default: "nl"
    validations:
      required: true

  - type: input
    id: rvn_title
    attributes:
      label: RVN Titel
      placeholder: "1 april – Nieuwjaarsdag in het oude 13-maanden stelsel"
    validations:
      required: true

  - type: textarea
    id: rvn_teaser
    attributes:
      label: Teaser
      description: Korte samenvatting (1-3 zinnen)
      placeholder: "Waarom vieren we 1 april eigenlijk nog als April Fools’ Day terwijl het ooit Nieuwjaarsdag was?"
    validations:
      required: true

  - type: textarea
    id: body
    attributes:
      label: Volledige tekst (Markdown)
      description: Schrijf hier je volledige RVN
      render: markdown
    validations:
      required: true

  - type: input
    id: donation_link
    attributes:
      label: Donatie link (optioneel)
      placeholder: "https://ko-fi.com/jouwnaam of Monero adres"
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Extra opmerkingen (optioneel)
      description: Bijv. "Gerelateerd aan guide X" of "Graag controleren op feit Y"
    validations:
      required: false