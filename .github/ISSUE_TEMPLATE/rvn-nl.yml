name: "RVN toevoegen (Nederlands)"
description: Voeg een nieuwe Reality vs Narrative post toe in het Nederlands.
title: "[RVN NL] "
labels: ["rvn", "pending-review", "nl"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Bedankt voor je bijdrage!  
        Nummer, hashes, dag-nummer en bestandsnaam worden automatisch toegevoegd.

  - type: dropdown
    id: language
    attributes:
      label: Taal
      options:
        - nl
      default: "nl"
    validations:
      required: true

  - type: input
    id: rvn_title
    attributes:
      label: RVN Titel
      placeholder: "1 april – Nieuwjaarsdag in het oude 13-maanden stelsel"
    validations:
      required: true

  - type: textarea
    id: rvn_teaser
    attributes:
      label: Teaser
      description: Korte samenvatting (1-3 zinnen) die nieuwsgierigheid opwekt. Dit wordt gebruikt in de overzichtskaarten.
      placeholder: "Waarom vieren we 1 april eigenlijk nog als April Fools’ Day terwijl het ooit Nieuwjaarsdag was?"
    validations:
      required: true

  - type: textarea
    id: body
    attributes:
      label: Volledige RVN tekst (Markdown)
      description: |
        Schrijf hier je volledige Reality vs Narrative post.
        
        Gebruik Markdown voor opmaak:
        - Hoofdstukken beginnen met  
        - **Vetgedrukt** tekst
        - Lijsten met - of *
        - Blockquotes met >
        
        [→ Markdown cheatsheet openen](https://www.markdownguide.org/cheat-sheet/) (nieuw tabblad)
      placeholder: |
        It is April 1st, 2026.
        
        For most people this is April Fools’ Day: a day of jokes and silliness.
    validations:
      required: true

  - type: input
    id: donation_link
    attributes:
      label: Donatie link (optioneel)
      description: Bijv. Ko-fi, Monero, BTC of Stripe link
      placeholder: "https://ko-fi.com/jouwnaam"
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Extra opmerkingen voor het core team (optioneel)
      description: |
        Bijvoorbeeld: "Gerelateerd aan guide X" of "Graag controleren op feit Y"
    validations:
      required: false