name: "RVN toevoegen (Nederlands + English)"
description: Voeg een nieuwe Reality vs Narrative post toe. Nederlands is verplicht, Engels is optioneel.
title: "[RVN] "
labels: ["rvn", "pending-review"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Bedankt voor je bijdrage!  
        Dag-nummer, hashes en bestandsnaam worden automatisch toegevoegd.

  - type: dropdown
    id: primary_language
    attributes:
      label: Primaire taal van deze post
      options:
        - nl
        - en
      default: 0
    validations:
      required: true

  - type: input
    id: rvn_title_nl
    attributes:
      label: RVN Titel (Nederlands)
      placeholder: "1 april – Nieuwjaarsdag in het oude 13-maanden stelsel"
    validations:
      required: true

  - type: input
    id: rvn_title_en
    attributes:
      label: RVN Title (English) – optioneel
      placeholder: "1 April – New Year’s Day in the old 13-month calendar"
    validations:
      required: false

  - type: textarea
    id: rvn_teaser_nl
    attributes:
      label: Teaser (Nederlands)
      description: Korte samenvatting (1-3 zinnen) die nieuwsgierigheid opwekt.
      placeholder: "Waarom vieren we 1 april eigenlijk nog als April Fools’ Day terwijl het ooit Nieuwjaarsdag was?"
    validations:
      required: true

  - type: textarea
    id: rvn_teaser_en
    attributes:
      label: Teaser (English) – optioneel
      description: Short summary (1-3 sentences) that sparks curiosity.
      placeholder: "Why do we still celebrate April 1st as April Fools’ Day while it was once New Year’s Day?"
    validations:
      required: false

  - type: textarea
    id: body_nl
    attributes:
      label: Volledige RVN tekst (Nederlands – Markdown)
      description: |
        Schrijf hier je volledige Reality vs Narrative post.
        
        Gebruik Markdown voor opmaak:
        - Hoofdstukken beginnen met ###
        - **Vetgedrukte** tekst
        - Lijsten met - of *
        - Blockquotes met >
        
        [→ Markdown cheatsheet (opent in nieuw tabblad)](https://www.markdownguide.org/cheat-sheet/)
      placeholder: |
        Waarom vieren we 1 april eigenlijk als "gekke dag"?
        
        Terwijl het ooit Nieuwjaarsdag was?
    validations:
      required: true

  - type: textarea
    id: body_en
    attributes:
      label: Full RVN text (English – Markdown) – optioneel
      description: |
        Write your full Reality vs Narrative post here.
        
        Use Markdown for formatting:
        - Headings start with ###
        - **Bold** text
        - Lists with - or *
        - Blockquotes with >
        
        [→ Markdown cheatsheet (opens in new tab)](https://www.markdownguide.org/cheat-sheet/)
      placeholder: |
        Why do we actually celebrate April 1st as "April Fools’ Day"?
        
        While it was once New Year’s Day?
    validations:
      required: false

  - type: input
    id: donation_link
    attributes:
      label: Donatie link (optioneel)
      description: Bijv. Ko-fi, Monero, BTC of Stripe link
      placeholder: "https://ko-fi.com/jouwnaam"
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Extra opmerkingen voor het core team (optioneel)
      description: Bijvoorbeeld "Graag vertalen naar English" of "Gerelateerd aan guide X"
    validations:
      required: false